* { box-sizing: border-box; margin: 0; padding: 0; }
:root {

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
.header { background: var(--brand); color: #fff; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 28px; height: 28px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: var(--brand); }
.header-title { font-size: 15px; font-weight: 500; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.6); }
.header-date { font-size: 12px; color: rgba(255,255,255,0.6); }
.nav { background: var(--brand); border-top: 1px solid rgba(255,255,255,0.1); display: flex; overflow-x: auto; position: sticky; top: 52px; z-index: 99; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { padding: 10px 16px; font-size: 12px; color: rgba(255,255,255,0.6); border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
.nav-btn:hover:not(.active) { color: rgba(255,255,255,0.9); }
.content { padding: 16px; max-width: 960px; margin: 0 auto; width: 100%; }
.section-title { font-size: 16px; font-weight: 500; color: var(--brand); margin-bottom: 14px; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 500; color: var(--brand); }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.stat-card.green .stat-num { color: var(--green); }
.stat-card.yellow .stat-num { color: var(--yellow); }
.stat-card.red .stat-num { color: var(--red); }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.filter-btn.green.active { background: var(--green); border-color: var(--green); }
.filter-btn.yellow.active { background: var(--yellow); border-color: var(--yellow); }
.filter-btn.red.active { background: var(--red); border-color: var(--red); }
.search-input { flex: 1; min-width: 160px; padding: 6px 10px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
.search-input:focus { border-color: var(--brand); }
.inv-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.inv-table th { font-size: 11px; color: var(--text-muted); font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--border); background: var(--bg); }
.inv-table td { padding: 8px; border-bottom: 0.5px solid var(--border); font-size: 13px; vertical-align: middle; }
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr:hover td { background: var(--bg); }
.status-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-light); }
.btn-orange { background: var(--orange); color: var(--brand); border-color: var(--orange); font-weight: 500; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.action-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 12px; }
.action-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; color: var(--brand); }
.action-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { padding: 7px 10px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; width: 100%; }
.form-group input:focus, .form-group select:focus { border-color: var(--brand); }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider span { font-size: 11px; color: var(--text-muted); }
.divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
.upload-zone { border: 1.5px dashed var(--border); border-radius: 8px; padding: 24px 20px; text-align: center; cursor: pointer; transition: all 0.15s; display: block; }
.upload-zone:hover { border-color: var(--brand); background: var(--cream); }
.upload-zone input { display: none; }
.upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: var(--cream); color: var(--brand); margin: 1px; }
.tag-warn { background: var(--yellow-bg); color: var(--yellow); }
.ai-thinking { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--cream); border-radius: 8px; font-size: 13px; color: var(--brand); margin: 10px 0; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(5,68,73,0.2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.result-box { background: var(--green-bg); border: 0.5px solid rgba(45,122,79,0.3); border-radius: 8px; padding: 12px; margin: 10px 0; font-size: 13px; color: var(--green); }
.result-box-blue { background: var(--blue-bg); border: 0.5px solid rgba(26,111,160,0.3); border-radius: 8px; padding: 12px; margin: 10px 0; font-size: 13px; color: var(--blue); }
.error-box { background: var(--red-bg); border: 0.5px solid rgba(192,57,43,0.3); border-radius: 8px; padding: 12px; margin: 10px 0; font-size: 13px; color: var(--red); }
.warn-box { background: var(--yellow-bg); border: 0.5px solid rgba(184,122,0,0.3); border-radius: 8px; padding: 12px; margin: 10px 0; font-size: 13px; color: var(--yellow); }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--brand); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; max-width: 300px; }
.toast.show { opacity: 1; transform: translateY(0); }
.cat-header { font-size: 11px; font-weight: 500; color: var(--orange); background: var(--cream); padding: 4px 8px; letter-spacing: 0.5px; text-transform: uppercase; }
.qty-input { width: 70px; padding: 4px 6px; border: 0.5px solid var(--border); border-radius: 5px; font-size: 13px; text-align: center; background: var(--surface); color: var(--text); }
.qty-input:focus { border-color: var(--brand); outline: none; }
.recipe-card { border: 0.5px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.recipe-name { font-size: 13px; font-weight: 500; color: var(--brand); margin-bottom: 6px; }
.log-entry { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.log-entry:last-child { border-bottom: none; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.log-dot-in { background: var(--green); }
.log-dot-out { background: var(--red); }
.log-dot-adj { background: var(--yellow); }
.log-dot-sales { background: var(--blue); }
.log-meta { font-size: 11px; color: var(--text-muted); }
.log-desc { font-size: 13px; }
.sales-history-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.sales-history-item:last-child { border-bottom: none; }
.period-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--cream); color: var(--brand); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .form-row { grid-template-columns: 1fr; }
  .content { padding: 12px; }
  .inv-table th:nth-child(5), .inv-table td:nth-child(5) { display: none; }

function norm(s){return s.toLowerCase().replace(/[-–]/g,' ').replace(/\s+/g,' ').trim();}
function fuzzyMatch(items,name){const n=norm(name);return items.find(i=>norm(i.name)===n)||items.find(i=>norm(i.name).includes(n)||n.includes(norm(i.name)));}

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    ST.items=s.items&&s.items.length?s.items:DEFAULT_ITEMS;
    ST.recipes=s.recipes&&s.recipes.length?s.recipes:DEFAULT_RECIPES;
    ST.activityLog=s.activityLog||[];
    ST.salesData=s.salesData||INITIAL_SALES;
    ST.salesHistory=s.salesHistory||[];
    ST.totalSalesDays=s.totalSalesDays||30;
    ST.movements=s.movements||[];
    ST.openingSnapshot=s.openingSnapshot||null;
  }catch(e){ST.items=DEFAULT_ITEMS;ST.recipes=DEFAULT_RECIPES;ST.salesData=INITIAL_SALES;ST.movements=[];}
}

function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({items:ST.items,recipes:ST.recipes,activityLog:ST.activityLog.slice(0,200),salesData:ST.salesData,salesHistory:ST.salesHistory.slice(0,52),totalSalesDays:ST.totalSalesDays,movements:ST.movements.slice(0,2000),openingSnapshot:ST.openingSnapshot}));}catch(e){}
}

// Record a stock movement for reports. dir: 'in'|'out', source: 'invoice'|'manual'|'sales'|'wastage'|'count'
function recordMove(itemId,itemName,dir,source,qty,unit){
  ST.movements.unshift({id:Date.now()+Math.random(),itemId,itemName,dir,source,qty,unit,ts:Date.now(),date:new Date().toISOString().slice(0,10)});
}

function status(i){if(i.stock<=0)return'red';const r=i.stock/i.parLevel;return r>=1?'green':r>=0.4?'yellow':'red';}

function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

function log(type,desc,details=''){ST.activityLog.unshift({id:Date.now(),type,desc,details,ts:new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});}

function go(tab){ST.tab=tab;ST.stockInMode=null;ST.stockOutMode=null;ST.aiResult=null;ST.aiError=null;ST.aiWarn=null;renderNav();render();}

function render(){

  if(ST.tab==='recipes'){

    if(rows&&rows.children.length===0){rows.insertAdjacentHTML('beforeend',ingRowHtml());rows.insertAdjacentHTML('beforeend',ingRowHtml());}

function rInv(){
  let f=ST.items;
  if(ST.invFilter!=='all') f=f.filter(i=>status(i)===ST.invFilter);
  if(ST.invSearch) f=f.filter(i=>i.name.toLowerCase().includes(ST.invSearch.toLowerCase()));
  const g={};f.forEach(i=>{if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i);});
  return`<div class="filter-row">
    <input class="search-input" placeholder="Search items..." value="${ST.invSearch}" oninput="ST.invSearch=this.value;updateInvTable()">
    <button class="filter-btn ${ST.invFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn green ${ST.invFilter==='green'?'active':''}" onclick="setFilter('green')">● Good</button>
    <button class="filter-btn yellow ${ST.invFilter==='yellow'?'active':''}" onclick="setFilter('yellow')">● Low</button>
    <button class="filter-btn red ${ST.invFilter==='red'?'active':''}" onclick="setFilter('red')">● Critical</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="inv-table">
      <thead><tr><th style="width:32%">Item</th><th style="width:14%">Status</th><th style="width:13%">Stock</th><th style="width:13%">Par level</th><th style="width:10%">Lead</th><th style="width:18%">Adjust</th></tr></thead>
      <tbody id="inv-tbody">${buildInvRows(g)}</tbody>
    </table>
  </div>`;
}

function buildInvRows(grouped){
  if(!grouped){
    let f=ST.items;
    if(ST.invFilter!=='all') f=f.filter(i=>status(i)===ST.invFilter);
    if(ST.invSearch) f=f.filter(i=>i.name.toLowerCase().includes(ST.invSearch.toLowerCase()));
    grouped={};f.forEach(i=>{if(!grouped[i.cat])grouped[i.cat]=[];grouped[i.cat].push(i);});
  }
  return Object.entries(grouped).map(([cat,its])=>`
    <tr><td colspan="6" class="cat-header">${cat}</td></tr>
    ${its.map(i=>{const s=status(i);return`<tr>
      <td style="font-size:13px">${i.name}<div style="font-size:11px;color:var(--text-muted)">${i.vendor}</div></td>
      <td><span class="status-badge badge-${s}">${s==='green'?'● Good':s==='yellow'?'● Low':'● Critical'}</span></td>
      <td><input type="number" class="qty-input" value="${i.stock}" onchange="updateStock('${i.id}',this.value)" min="0"></td>
      <td style="color:var(--text-muted)">${i.parLevel} ${i.unit}</td>
      <td style="color:var(--text-muted)">${i.deliveryDays}d</td>
      <td><button class="btn btn-sm" onclick="adjStock('${i.id}',1)">+</button> <button class="btn btn-sm" onclick="adjStock('${i.id}',-1)">−</button></td>
    </tr>`;}).join('')}`).join('');
}

function rForecast(){
  const days=ST.totalSalesDays||30;
  const ing={};
  ST.recipes.forEach(r=>{const q=ST.salesData[r.name]||0;if(q>0)r.ingredients.forEach(i=>{const n=parseFloat(i.qty)||1;ing[i.name]=(ing[i.name]||0)+(q/days)*n;});});
  const list=ST.items.map(i=>{const du=Math.round((ing[i.name]||0)*10)/10,dos=du>0?Math.round(i.stock/du):999,oq=Math.max(0,i.parLevel-i.stock),urg=i.stock<=0?'red':i.stock<i.parLevel*0.3?'red':i.stock<i.parLevel?'yellow':'green';return{...i,du,dos,oq,urg};}).filter(i=>i.oq>0).sort((a,b)=>{const o={red:0,yellow:1,green:2};return o[a.urg]-o[b.urg]||b.oq-a.oq;});

function rReports(){
  const now=new Date();
  let startDate;
  if(ST.reportPeriod==='week'){startDate=new Date(now);startDate.setDate(now.getDate()-7);}
  else if(ST.reportPeriod==='month'){startDate=new Date(now);startDate.setMonth(now.getMonth()-1);}
  else {startDate=new Date(now);startDate.setDate(now.getDate()-7);}
  const startTs=startDate.getTime();
  const periodMoves=ST.movements.filter(m=>m.ts>=startTs);

  // Build per-item report
  const rep={};
  ST.items.forEach(i=>{rep[i.id]={name:i.name,cat:i.cat,unit:i.unit,closing:i.stock,invoiceIn:0,manualIn:0,countIn:0,salesOut:0,wastageOut:0,manualOut:0,countOut:0};});
  periodMoves.forEach(m=>{
    if(!rep[m.itemId]) return;
    const r=rep[m.itemId];
    if(m.dir==='in'){ if(m.source==='invoice')r.invoiceIn+=m.qty; else if(m.source==='count')r.countIn+=m.qty; else r.manualIn+=m.qty; }
    else { if(m.source==='sales')r.salesOut+=m.qty; else if(m.source==='wastage')r.wastageOut+=m.qty; else if(m.source==='count')r.countOut+=m.qty; else r.manualOut+=m.qty; }
  });
  // Opening = closing - totalIn + totalOut
  Object.values(rep).forEach(r=>{
    const totIn=r.invoiceIn+r.manualIn+r.countIn;
    const totOut=r.salesOut+r.wastageOut+r.manualOut+r.countOut;
    r.opening=Math.max(0,Math.round((r.closing-totIn+totOut)*10)/10);
    r.totalIn=Math.round(totIn*10)/10;
    r.totalOut=Math.round(totOut*10)/10;
  });
  const rows=Object.values(rep).filter(r=>r.totalIn>0||r.totalOut>0||r.closing>0);
  const totMoves=periodMoves.length;

  // Totals
  const sumIn=rows.reduce((a,r)=>a+r.totalIn,0);
  const sumOut=rows.reduce((a,r)=>a+r.totalOut,0);
  const sumSales=rows.reduce((a,r)=>a+r.salesOut,0);
  const sumWaste=rows.reduce((a,r)=>a+r.wastageOut,0);

  return`<div class="section-title">▤ Reports</div>
    <div class="filter-row">
      <button class="filter-btn ${ST.reportPeriod==='week'?'active':''}" onclick="ST.reportPeriod='week';render()">This week (7 days)</button>
      <button class="filter-btn ${ST.reportPeriod==='month'?'active':''}" onclick="ST.reportPeriod='month';render()">This month (30 days)</button>
      <button class="btn btn-orange btn-sm" style="margin-left:auto" onclick="downloadReport()">↓ Download CSV</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Period: ${startDate.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})} – ${now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} · ${totMoves} movements recorded</div>
    ${totMoves===0?`<div class="warn-box">No movements recorded in this period yet. Reports build up as you log stock in/out from today onward.</div>`:''}
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card green"><div class="stat-num" style="font-size:18px">${Math.round(sumIn)}</div><div class="stat-label">Total IN (all units)</div></div>
      <div class="stat-card red"><div class="stat-num" style="font-size:18px">${Math.round(sumOut)}</div><div class="stat-label">Total OUT (all units)</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:18px">${Math.round(sumSales)}</div><div class="stat-label">Used in sales</div></div>
      <div class="stat-card yellow"><div class="stat-num" style="font-size:18px">${Math.round(sumWaste)}</div><div class="stat-label">Wastage</div></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table class="inv-table" style="min-width:760px">
        <thead><tr>
          <th style="width:18%">Item</th><th style="width:9%">Opening</th>
          <th style="width:9%">In: Invoice</th><th style="width:9%">In: Manual</th>
          <th style="width:9%">Out: Sales</th><th style="width:9%">Out: Wastage</th><th style="width:9%">Out: Manual</th>
          <th style="width:9%">Count adj</th><th style="width:9%">Closing</th>
        </tr></thead>
        <tbody>${rows.length===0?`<tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:20px">No activity yet</td></tr>`:rows.map(r=>`<tr>
          <td style="font-size:12px">${r.name}<div style="font-size:10px;color:var(--text-muted)">${r.cat}</div></td>
          <td>${r.opening} ${r.unit}</td>
          <td style="color:var(--green)">${r.invoiceIn||'—'}</td>
          <td style="color:var(--green)">${r.manualIn||'—'}</td>
          <td style="color:var(--red)">${r.salesOut||'—'}</td>
          <td style="color:var(--yellow)">${r.wastageOut||'—'}</td>
          <td style="color:var(--red)">${r.manualOut||'—'}</td>
          <td style="color:var(--text-muted)">${(r.countIn-r.countOut)||'—'}</td>
          <td style="font-weight:500">${r.closing} ${r.unit}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function downloadReport(){
  const now=new Date();
  let startDate=new Date(now);
  if(ST.reportPeriod==='month')startDate.setMonth(now.getMonth()-1);else startDate.setDate(now.getDate()-7);
  const startTs=startDate.getTime();
  const periodMoves=ST.movements.filter(m=>m.ts>=startTs);
  const rep={};
  ST.items.forEach(i=>{rep[i.id]={name:i.name,cat:i.cat,unit:i.unit,closing:i.stock,invoiceIn:0,manualIn:0,countIn:0,salesOut:0,wastageOut:0,manualOut:0,countOut:0};});
  periodMoves.forEach(m=>{if(!rep[m.itemId])return;const r=rep[m.itemId];if(m.dir==='in'){if(m.source==='invoice')r.invoiceIn+=m.qty;else if(m.source==='count')r.countIn+=m.qty;else r.manualIn+=m.qty;}else{if(m.source==='sales')r.salesOut+=m.qty;else if(m.source==='wastage')r.wastageOut+=m.qty;else if(m.source==='count')r.countOut+=m.qty;else r.manualOut+=m.qty;}});
  Object.values(rep).forEach(r=>{const ti=r.invoiceIn+r.manualIn+r.countIn,to=r.salesOut+r.wastageOut+r.manualOut+r.countOut;r.opening=Math.max(0,Math.round((r.closing-ti+to)*10)/10);});
  const header=['Item','Category','Unit','Opening Stock','In-Invoice','In-Manual','In-Count','Out-Sales','Out-Wastage','Out-Manual','Out-Count','Closing Stock'];
  const lines=[header.join(',')];
  Object.values(rep).filter(r=>r.invoiceIn||r.manualIn||r.salesOut||r.wastageOut||r.manualOut||r.closing).forEach(r=>{
    lines.push([`"${r.name}"`,`"${r.cat}"`,r.unit,r.opening,r.invoiceIn,r.manualIn,r.countIn,r.salesOut,r.wastageOut,r.manualOut,r.countOut,r.closing].join(','));
  });
  const period=ST.reportPeriod==='month'?'monthly':'weekly';
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`CS_${period}_report_${now.toISOString().slice(0,10)}.csv`;a.click();
  toast('Report downloaded');
}

      <div style="font-size:14px;font-weight:500;margin-bottom:4px">Data management</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Forecast based on ${ST.totalSalesDays} days · ${Object.keys(ST.salesData).length} dishes · ${ST.salesHistory.length} uploads</div>
      <div class="btn-row">
        <button class="btn" onclick="exportData()">Export data (JSON)</button>
        <button class="btn" style="color:var(--red);border-color:rgba(192,57,43,0.3)" onclick="resetStock()">Reset stock to 0</button>
        <button class="btn" style="color:var(--red);border-color:rgba(192,57,43,0.3)" onclick="resetSales()">Reset sales data</button>
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:500;margin-bottom:4px">API Configuration</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Required for AI invoice and wastage reading. Get your key from console.anthropic.com</div>
      <div class="form-group" style="margin-bottom:10px"><label>Anthropic API Key</label><input type="password" id="api-key-input" placeholder="sk-ant-..." value="${localStorage.getItem('cs_api_key')||''}"></div>
      <button class="btn btn-primary" onclick="saveApiKey()">Save API key →</button>
    </div>`;
}

function setMode(dir,m){if(dir==='in')ST.stockInMode=m;else ST.stockOutMode=m;ST.aiResult=null;ST.aiError=null;ST.aiWarn=null;render();}
function updateStock(id,v){const it=ST.items.find(i=>i.id===id);if(!it)return;const old=it.stock;it.stock=Math.max(0,parseFloat(v)||0);log('adj',`${it.name} adjusted`,`${old}→${it.stock} ${it.unit}`);saveState();toast('Stock updated');}
function adjStock(id,d){const it=ST.items.find(i=>i.id===id);if(!it)return;it.stock=Math.max(0,it.stock+d);log('adj',`${it.name} adjusted`,`${d>0?'+':''}${d} ${it.unit}`);saveState();render();toast(`${it.name}: ${it.stock} ${it.unit}`);}
function applyManualIn(){const id=document.getElementById('mi').value,q=parseFloat(document.getElementById('mq').value)||0,n=document.getElementById('mn').value;if(!id||q<=0){toast('Select item and enter quantity');return;}const it=ST.items.find(i=>i.id===id);if(!it)return;it.stock+=q;recordMove(it.id,it.name,'in','manual',q,it.unit);log('in',`${it.name} received: +${q} ${it.unit}`,n);saveState();toast(`Added ${q} ${it.unit} of ${it.name}`);setMode('in',null);}
function applyBulk(){let n=0;ST.items.forEach(i=>{const el=document.getElementById(`b-${i.id}`);if(el&&el.value!==''){const v=Math.max(0,parseFloat(el.value)||0);if(v!==i.stock){const diff=v-i.stock;recordMove(i.id,i.name,diff>=0?'in':'out','count',Math.abs(diff),i.unit);log('adj',`${i.name} physical count`,`${i.stock}→${v} ${i.unit}`);i.stock=v;n++;}}});saveState();toast(`${n} items updated`);setMode('in',null);}
function applyManualOut(){const id=document.getElementById('oi').value,q=parseFloat(document.getElementById('oq').value)||0,r=document.getElementById('or2').value,n=document.getElementById('on').value;if(!id||q<=0){toast('Select item and enter quantity');return;}const it=ST.items.find(i=>i.id===id);if(!it)return;it.stock=Math.max(0,it.stock-q);recordMove(it.id,it.name,'out',r==='Wastage'||r==='Spoiled'?'wastage':'manual',q,it.unit);log('out',`${it.name} deducted: −${q} ${it.unit}`,`${r}${n?'. '+n:''}`);saveState();toast(`Removed ${q} ${it.unit}`);setMode('out',null);}

function getApiKey(){return localStorage.getItem('cs_api_key')||'';}
function saveApiKey(){const k=document.getElementById('api-key-input').value.trim();localStorage.setItem('cs_api_key',k);toast('API key saved');}

async function callAI(content){
  const key=getApiKey();
  if(!key){throw new Error('No API key set. Go to Setup → API Configuration to add your Anthropic API key.');}
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content}]})});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'API error');}
  const data=await res.json();
  return data.content&&data.content[0]?data.content[0].text:'';
}

async function handleInvoice(event){
  const file=event.target.files[0];if(!file)return;
  ST.aiProcessing=true;ST.aiResult=null;ST.aiError=null;render();
  try{
    const b64=await toB64(file);
    const names=ST.items.map(i=>i.name).join(', ');
    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const content=isPDF?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:`This is a supplier invoice for a cafe. Extract every line item with its quantity.

CRITICAL UNIT RULES — convert everything to base units:
- Weight: always return grams (gm). "1 kg" = 1000, "1.5 kg" = 1500, "500 g" = 500, "250 gm" = 250.
- Volume: always return millilitres (ml). "1 L" = 1000, "2 litre" = 2000, "500 ml" = 500.
- Count items (eggs, breads, buns): return the piece count with unit "pc".
- Packets/tins/bottles: return count with unit "pkt", "tin", or "bottle".
- If an item shows "2 x 500g", multiply to get total = 1000 gm.

Known inventory items (match names to these where possible): ${names}.

Return ONLY valid JSON, no other text:
{"items":[{"name":"item name","qty":<number in base unit>,"unit":"gm|ml|pc|pkt|tin|bottle","raw":"original text seen on invoice e.g. 1 kg"}]}`}]:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:`This is a photo of a supplier invoice for Caffeinated Shots cafe. Extract every line item with its quantity.

CRITICAL UNIT RULES — convert everything to base units:
- Weight: always return grams (gm). "1 kg" = 1000, "1.5 kg" = 1500, "500 g" = 500, "250 gm" = 250.
- Volume: always return millilitres (ml). "1 L" = 1000, "2 litre" = 2000, "500 ml" = 500.
- Count items (eggs, breads, buns): return the piece count with unit "pc".
- Packets/tins/bottles: return count with unit "pkt", "tin", or "bottle".
- If an item shows "2 x 500g", multiply to get total = 1000 gm.

Known inventory items (match names to these where possible): ${names}.

Return ONLY valid JSON, no other text:
{"items":[{"name":"item name","qty":<number in base unit>,"unit":"gm|ml|pc|pkt|tin|bottle","raw":"original text e.g. 1 kg"}]}`}];
    const txt=await callAI(content);
    ST.aiResult=JSON.parse(txt.replace(/```json|```/g,'').trim());
    ST.aiProcessing=false;render();
  }catch(e){ST.aiProcessing=false;ST.aiError=e.message||'Could not read invoice. Try a clearer photo or use manual entry.';render();}
}

async function handleWastage(event){
  const file=event.target.files[0];if(!file)return;
  ST.aiProcessing=true;ST.aiResult=null;ST.aiError=null;render();
  try{
    const b64=await toB64(file);
    const names=ST.items.map(i=>i.name).join(', ');
    const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
    const content=isPDF?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:`Wastage log. Extract items, quantities, reasons. Known items: ${names}. Return ONLY JSON: {"items":[{"name":"item name","qty":number,"unit":"gm or ml or pc","reason":"reason if written"}]}`}]:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:`Wastage log sheet from Caffeinated Shots kitchen. Extract all wasted items, quantities, and reasons. Known items: ${names}. Return ONLY JSON: {"items":[{"name":"item name","qty":number,"unit":"gm or ml or pc","reason":"reason if written"}]}`}];
    const txt=await callAI(content);
    ST.aiResult=JSON.parse(txt.replace(/```json|```/g,'').trim());
    ST.aiProcessing=false;render();
  }catch(e){ST.aiProcessing=false;ST.aiError=e.message||'Could not read wastage sheet.';render();}
}

async function handleSales(event,deductStock){
  const file=event.target.files[0];if(!file)return;
  ST.aiProcessing=true;ST.aiResult=null;ST.aiError=null;ST.aiWarn=null;render();
  try{
    const txt=await file.text();
    const lines=txt.split('\n').filter(l=>l.trim());
    const salesMap={};const dateSet=new Set();
    lines.slice(1).forEach(line=>{const cols=line.split(',').map(c=>c.replace(/"/g,'').trim());const date=cols[0],item=cols[2],type=cols[3],q=parseFloat(cols[4])||0;if(date)dateSet.add(date);if(item&&(type==='Sale'||type==='Non Chargeable')&&q>0)salesMap[item]=(salesMap[item]||0)+q;});
    const days=Math.max(dateSet.size,1);
    const deductions=[];
    if(deductStock){ST.recipes.forEach(r=>{const q=salesMap[r.name]||0;if(q>0)r.ingredients.forEach(i=>{const n=parseFloat(i.qty)||1;const ex=deductions.find(d=>d.name===i.name);if(ex)ex.qty=Math.round((ex.qty+q*n)*10)/10;else deductions.push({name:i.name,qty:Math.round(q*n*10)/10,unit:i.unit||''});});});}
    const topItems=Object.entries(salesMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>k);
    ST.aiResult={dishes:Object.keys(salesMap).length,deductions,salesMap,days,topItems};
    ST.aiProcessing=false;render();
  }catch(e){ST.aiProcessing=false;ST.aiError='Could not parse file. Ensure it is a Rista CSV export.';render();}
}

function applyInvoice(){if(!ST.aiResult||!ST.aiResult.items)return;let n=0;ST.aiResult.items.forEach((it,idx)=>{
  // Read possibly-edited values from inputs
  const qEl=document.getElementById('inv-q-'+idx);
  const qty=qEl?parseFloat(qEl.value)||it.qty:it.qty;
  const inv=fuzzyMatch(ST.items,it.name);
  if(inv){inv.stock+=qty;recordMove(inv.id,inv.name,'in','invoice',qty,inv.unit);n++;}
});log('in',`Invoice uploaded — ${n} items added to stock`);saveState();toast(`${n} items updated from invoice`);setMode('in',null);go('inventory');}
function applyWastage(){if(!ST.aiResult||!ST.aiResult.items)return;let n=0;ST.aiResult.items.forEach((it,idx)=>{const qEl=document.getElementById('wst-q-'+idx);const qty=qEl?parseFloat(qEl.value)||it.qty:it.qty;const inv=fuzzyMatch(ST.items,it.name);if(inv){inv.stock=Math.max(0,inv.stock-qty);recordMove(inv.id,inv.name,'out','wastage',qty,inv.unit);n++;}});log('out',`Wastage logged — ${n} items deducted`);saveState();toast(`${n} items deducted`);setMode('out',null);go('inventory');}
function applySales(deductStock){if(!ST.aiResult)return;const{salesMap,deductions,days,dishes}=ST.aiResult;Object.entries(salesMap).forEach(([d,q])=>{ST.salesData[d]=(ST.salesData[d]||0)+q;});ST.totalSalesDays=(ST.totalSalesDays||0)+days;ST.salesHistory.unshift({label:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}),dishes,days});if(deductStock&&deductions&&deductions.length>0){deductions.forEach(d=>{const inv=ST.items.find(i=>i.name.toLowerCase()===d.name.toLowerCase());if(inv){inv.stock=Math.max(0,inv.stock-d.qty);recordMove(inv.id,inv.name,'out','sales',d.qty,inv.unit);}});log('out',`Daily sales uploaded — ${dishes} dishes · ${deductions.length} deductions`,`${days} day(s)`);}else{log('sales',`Weekly sales uploaded — ${dishes} dishes · ${days} days`,`Total: ${ST.totalSalesDays}d`);}saveState();toast(deductStock?`Stock updated · forecast on ${ST.totalSalesDays}d data`:`Forecast updated — ${days} days added`);setMode('out',null);go(deductStock?'inventory':'forecast');}
function addRecipe(){
  const n=document.getElementById('rn').value.trim();
  let c=document.getElementById('rc').value;
  if(c==='__new'){c=(document.getElementById('rc-new').value.trim())||'Other';}
  const rows=document.querySelectorAll('#recipe-ing-rows .ing-row');
  const ingredients=[];
  rows.forEach(row=>{const name=row.querySelector('.ing-name').value;const qty=row.querySelector('.ing-qty').value;if(name&&qty)ingredients.push({name,qty:String(qty)});});
  if(!n){toast('Enter the dish name');return;}
  if(ingredients.length===0){toast('Add at least one ingredient');return;}
  // Check for duplicate recipe name
  if(ST.recipes.some(r=>r.name.toLowerCase()===n.toLowerCase())){toast('A recipe with this name already exists');return;}
  ST.recipes.push({id:'r'+Date.now(),name:n,category:c||'Other',ingredients});
  saveState();toast('Recipe added ✓');render();
}
function addItem(){const n=document.getElementById('ni-name').value.trim(),c=document.getElementById('ni-cat').value,v=document.getElementById('ni-vendor').value.trim(),u=document.getElementById('ni-unit').value.trim(),p=parseFloat(document.getElementById('ni-par').value)||0,d=parseInt(document.getElementById('ni-del').value)||1;if(!n||!u){toast('Enter item name and unit');return;}ST.items.push({id:'i'+Date.now(),name:n,cat:c,vendor:v||'Other',deliveryDays:d,parLevel:p,stock:0,unit:u});saveState();toast('Item added');render();}
function exportData(){const blob=new Blob([JSON.stringify({items:ST.items,recipes:ST.recipes,salesData:ST.salesData,log:ST.activityLog},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cs_inventory.json';a.click();}
function resetStock(){if(!confirm('Reset all stock to 0?'))return;ST.items.forEach(i=>i.stock=0);log('adj','All stock reset to 0');saveState();toast('Stock reset');render();}
function resetSales(){if(!confirm('Reset all sales and forecast data?'))return;ST.salesData={};ST.salesHistory=[];ST.totalSalesDays=0;log('adj','Sales data reset');saveState();toast('Sales data reset');render();}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

document.getElementById('header-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
loadState();renderNav();render();
</script>
